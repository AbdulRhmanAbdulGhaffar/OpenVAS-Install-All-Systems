name: CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install linters
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          python -m pip install --upgrade pip
          pip install yamllint

      - name: Shellcheck Bash scripts
        run: |
          shellcheck -x openvas-install.sh || true

      - name: Lint YAML (workflows + docker)
        run: |
          yamllint -d "extends: default" . || true

      - name: Quick README links check
        run: |
          grep -q "OpenVAS-Install-All-Systems" README.md
